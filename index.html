<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <a href="primer.html">
        <button type="button" id="submitBtn">Primera Tarea</button>
    </a>

    <div class="form-container">
        <form id="contactForm">
            
            <h2>Formulario de Registro</h2>
            
            <div class="input-group">
                <label for="username">Nombre:</label>
                <input type="text" id="username" placeholder="Nombre:">
                <span class="error-msg">Este campo es obligatorio</span>
            </div>

            <div class="input-group">
                <label for="email">Correo:</label>
                <input type="email" id="email" placeholder="Email">
                <span class="error-msg">Introduce un correo válido</span>
            </div>
            
            <div class="input-group">
                <label for="username">Nombre:</label>
                <input type="text" id="username" placeholder="Nombre:">
                <span class="error-msg">Este campo es obligatorio</span>
            </div>

            <button type="submit" id="submitBtn">Enviar Mensaje</button>
        </form>
        <div id="successMessage" class="hidden">¡Enviado con éxito!</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
