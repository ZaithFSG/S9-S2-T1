<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="top-nav">
        <a href="primer.html" class="nav-btn">← Volver a Primera Tarea</a>
    </nav>

    <div class="form-container">
        <form id="contactForm">
            <h2>Formulario de registro</h2>            
            <div class="input-group">
                <label for="username">Nombre</label>
                <input type="text" id="username" placeholder="Nombre:" required>
            </div>

            <div class="input-group">
                <label for="email">Correo:</label>
                <input type="email" id="email" placeholder="Email:" required>
            </div>
            
            <div class="input-group">
                <label for="phone">Teléfono</label>
                <input type="tel" id="phone" placeholder="Teléfono">
            </div>

            <div class="input-group">
                <label for="curso">Curso:</label>
                <select id="curso" name="curso" required>
                    <option value="" disabled selected>Selecciona un curso...</option>
                    <option value="fullstack">FullStack Developer</option>
                    <option value="iot">Fundamentos básicos de IOT</option>
                    <option value="moviles">Diseño y desarrollo de apps móviles</option>
                </select>
            </div>

            <button type="submit" id="submitBtn">Finalizar Registro</button>
        </form>

        <div id="successMessage" class="hidden">
            <div class="success-icon">✓</div>
            <h3>¡Registro Exitoso!</h3>
            <p>Redirigiendo a la página principal...</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
